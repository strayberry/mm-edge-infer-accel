name: pi05_libero

model:
  family: pi05
  model_id: lerobot/pi05_libero_finetuned_v044
  model_path:
  dtype: bfloat16
  max_new_tokens: 0

runtime:
  backend: lerobot
  batch_size: 1
  device: cuda

eval:
  dataset: HuggingFaceVLA/libero
  episodes: [0, 1, 2]
  sample_count: 100
  mode: queue
  output_dir: outputs

profile:
  warmup: 3
  repeats: 1
  output_dir: profiling
